<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaxTeng</title>
<style>
  :root{
    --bg:#0f1115;--card:#171a21;--text:#eef0f3;--muted:#9aa3b2;--accent:#5b8cff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    background:var(--bg);color:var(--text);
    display:flex;justify-content:center;
  }
  .wrap{max-width:560px;width:100%;padding:64px 24px 48px;}
  h1{font-size:32px;margin:0 0 4px;letter-spacing:0.5px;}
  .sub{color:var(--muted);font-size:15px;margin:0 0 40px;}
  .app{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border-radius:14px;padding:18px 20px;margin-bottom:14px;
    text-decoration:none;color:var(--text);transition:transform .15s, background .15s;
  }
  .app:hover{transform:translateY(-2px);background:#1d212b;}
  .app-name{font-size:16px;font-weight:600;margin:0 0 4px;}
  .app-desc{font-size:13px;color:var(--muted);margin:0;}
  .arrow{color:var(--accent);font-size:18px;flex-shrink:0;margin-left:16px;}
  footer{margin-top:48px;color:var(--muted);font-size:13px;}
  footer a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>MaxTeng</h1>
    <p class="sub">獨立開發者 · Android App 工具與遊戲</p>

    <a class="app" href="https://play.google.com/store/apps/details?id=com.maxteng.petsoul" target="_blank" rel="noopener">
      <div>
        <p class="app-name">PetSoul — 寵物情緒 AI 日記</p>
        <p class="app-desc">com.maxteng.petsoul</p>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="app" href="https://play.google.com/store/apps/details?id=com.maxteng.roadguard" target="_blank" rel="noopener">
      <div>
        <p class="app-name">RoadGuard — 行車蒐證工具</p>
        <p class="app-desc">com.maxteng.roadguard</p>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="app" href="https://play.google.com/store/apps/details?id=com.maxteng.blackjackpro" target="_blank" rel="noopener">
      <div>
        <p class="app-name">Blackjack Trainer Pro — 21點專業訓練</p>
        <p class="app-desc">com.maxteng.blackjackpro</p>
      </div>
      <span class="arrow">→</span>
    </a>

    <footer>聯絡信箱：<a href="mailto:ripteng@gmail.com">ripteng@gmail.com</a></footer>
  </div>
</body>
</html>
